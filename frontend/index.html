<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aksata – Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-logo">
      <i class="bi bi-graph-up-arrow"></i>
    </div>
    <h1 class="login-title">Aksata Finance</h1>
    <p class="login-subtitle">Dashboard Keuangan Terpadu</p>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label fw-600 fs-13">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input
            id="password"
            type="password"
            class="form-control border-start-0"
            placeholder="Masukkan password"
            autocomplete="current-password"
            required
          >
          <button type="button" class="btn btn-outline-secondary border-start-0"
            onclick="togglePwd(this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <div id="loginError" class="alert alert-danger py-2 small d-none"></div>

      <button id="loginBtn" type="submit" class="btn btn-primary w-100 py-2 fw-600">
        <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
      </button>
    </form>

    <p class="text-center text-muted fs-12 mt-3 mb-0">
      Aksata &copy; 2026 &mdash; v1.0
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  function togglePwd(btn) {
    const inp = document.getElementById('password');
    const ico = btn.querySelector('i');
    if (inp.type === 'password') {
      inp.type = 'text';
      ico.className = 'bi bi-eye-slash';
    } else {
      inp.type = 'password';
      ico.className = 'bi bi-eye';
    }
  }
</script>
</body>
</html>
